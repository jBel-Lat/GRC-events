<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Grading System - Student Login</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/panelist.css">
    <style>
        :root { --grc-maroon: #9B0F06; --grc-gray: #666; --bg: #f7f6f3; }
        body { background: var(--bg); }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .login-box {
            background: #fff;
            padding: 2.25rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            border: 1px solid #ece7df;
        }
        .brand-lockup { text-align: center; margin-bottom: 1.25rem; }
        .brand-mark {
            margin: 0 auto 0.75rem;
            display: flex;
            justify-content: center;
        }
        .brand-mark img { width: 240px; height: auto; display: block; }
        .brand-title { font-size: 1.45rem; color: var(--grc-maroon); font-weight: 800; line-height: 1.1; }
        .brand-sub { color: var(--grc-gray); font-size: 0.95rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.35rem; color: #3a3a3a; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 0.7rem 0.8rem;
            border: 1px solid #d8d3ca; border-radius: 10px;
            font-size: 1rem; box-sizing: border-box; background: #fff;
        }
        .form-group input::placeholder { color: #b5b0a7; opacity: 0.9; }
        .form-group input:focus { outline: none; border-color: var(--grc-maroon); box-shadow: 0 0 0 3px rgba(155, 15, 6, 0.12); }
        .login-btn {
            width: 100%; padding: 0.8rem; background: var(--grc-maroon); color: white;
            border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 12px 24px rgba(155, 15, 6, 0.18);
        }
        .login-btn:hover { transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .error-message { color: #b3261e; margin-bottom: 1rem; padding: 0.75rem; background: #ffecec; border-radius: 8px; display: none; border: 1px solid #f5c7c3; }
        .switch-role { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--grc-gray); }
        .switch-role a { color: var(--grc-maroon); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="brand-lockup">
                <div class="brand-mark">
                    <img src="/img/grc.png" alt="Global Reciprocal Colleges">
                </div>
                <div class="brand-sub">Student Portal</div>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <div id="welcomeBack" class="text-center text-muted" style="margin-bottom:1rem;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Ralph Felix C. Florita" required>
                </div>
                <div class="form-group">
                    <label for="studentNumber">Student ID</label>
                    <input type="text" id="studentNumber" name="studentNumber" placeholder="2024-07-00507" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <script src="/student/js/api.js"></script>
    <script src="/student/js/student.js"></script>
</body>
</html>
